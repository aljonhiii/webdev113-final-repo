<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Barangay Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login1.css">
    <link rel="stylesheet" href="../assets/css/register1.css">
    <style> 
        /* Modern Loading Spinner */
        .spinner {
            border: 2px solid rgba(59, 130, 246, 0.3); /* light blue */
            border-radius: 50%;
            border-top: 2px solid #2563eb; /* solid blue */
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        /* Disabled Button Style */
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="auth-layout">

    <header class="auth-header">
        <a href="../index.html" class="brand-logo">
            <span class="brand-icon">iM</span>
            <span class="brand-text">ISSUE</span>
        </a>
    </header>

    <main class="auth-main">
        <div class="auth-card auth-card-lg">
            
            <div class="auth-title-container">
                <h1 class="auth-title">Sign Up</h1>
                <p class="auth-subtitle" id="subtitleText">Create your secure barangay account.</p>
            </div>

            <div id="server_error" class="alert alert-error hidden"></div>

            <div class="step-indicators" id="stepIndicators">
                <div id="step-indicator-1" class="step-indicator active"></div>
                <div id="step-indicator-2" class="step-indicator"></div>
                <div id="step-indicator-3" class="step-indicator"></div>
                <div id="step-indicator-4" class="step-indicator"></div>
            </div>

            <form id="registerForm" class="auth-form">
                
                <div id="step1" class="step-container">
                    <h2 class="step-title">Step 1: Personal Identity</h2>
                    
                    <div class="grid-fields">
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="last_name" name="last_name" required pattern="[a-zA-Z\s\-ñÑ]+" title="Letters and spaces only." oninput="validateRealTime(this)"
                                class="form-input">
                            <p id="err_last_name" class="text-error hidden"></p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" id="first_name" name="first_name" required pattern="[a-zA-Z\s\-ñÑ]+" title="Letters and spaces only." oninput="validateRealTime(this)"
                                class="form-input">
                            <p id="err_first_name" class="text-error hidden"></p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Middle Name <span class="text-xs-info">(Optional)</span></label>
                            <input type="text" id="middle_name" name="middle_name" placeholder="Optional" oninput="validateRealTime(this)"
                                class="form-input">
                            <p id="err_middle_name" class="text-error hidden"></p>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label class="form-label">Birthday</label>
                        <input type="date" id="birthday" name="birthday" required max="2026-03-12" title="Please select a valid date of birth." oninput="validateRealTime(this)"
                            class="form-input" style="color: var(--text-gray);">
                        <p id="err_birthday" class="text-error hidden"></p>
                    </div>

                    <div style="margin-top: 1.5rem;">
                        <button type="button" onclick="nextStep(1)" class="btn-auth-submit">Next</button>
                    </div>
                </div>

                <div id="step2" class="step-container hidden">
                    <h2 class="step-title">Step 2: Residency & Contact</h2>
                    
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label class="form-label">Purok / Zone</label>
                        <select id="purok" name="purok" required title="Please select your Purok." oninput="validateRealTime(this)" class="form-input">
                            <option value="" disabled selected>Select your Purok</option>
                            <option value="Purok 1">Purok 1</option>
                            <option value="Purok 2">Purok 2</option>
                            <option value="Purok 3">Purok 3</option>
                            <option value="Purok 4">Purok 4</option>
                            <option value="Purok 5">Purok 5</option>
                            <option value="Purok 6">Purok 6</option>
                            <option value="Purok 7">Purok 7</option>
                        </select>
                        <p id="err_purok" class="text-error hidden"></p>
                    </div>

                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label class="form-label">Street / House No. <span class="text-xs-info">(Optional)</span></label>
                        <input type="text" id="street" name="street" placeholder="e.g., Blk 1 Lot 2, Macopa St." oninput="validateRealTime(this)"
                            class="form-input">
                        <p id="err_street" class="text-error hidden"></p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="phone_number" name="phone_number" placeholder="09123456789" required pattern="09[0-9]{9}" title="Must be an 11-digit number starting with 09" oninput="validateRealTime(this)"
                            class="form-input">
                        <p id="err_phone_number" class="text-error hidden"></p>
                    </div>

                    <div class="btn-group">
                        <button type="button" onclick="prevStep(2)" class="btn-secondary">Back</button>
                        <button type="button" onclick="nextStep(2)" class="btn-auth-submit">Next</button>
                    </div>
                </div>

                <div id="step3" class="step-container hidden">
                    <h2 class="step-title">Step 3: Account Security</h2>
                    
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="juan@example.com" required title="Please enter a valid email." oninput="validateRealTime(this)"
                            class="form-input">
                        <p id="err_email" class="text-error hidden"></p>
                    </div>

                   <div class="form-group" style="margin-bottom: 1rem;">
                        <label class="form-label">Password</label>
                        <input type="password" id="reg_password" name="password" placeholder="Create a strong password" required minlength="8" 
                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
                            title="Requires 1 uppercase, 1 lowercase, 1 number, and min 8 chars." 
                            oninput="validateRealTime(this); checkPasswordMatch();"
                            class="form-input">
                        <p id="err_reg_password" class="text-error hidden"></p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Type password again" required oninput="checkPasswordMatch()"
                            class="form-input">
                        <p id="err_confirm_password" class="text-error hidden"></p>
                    </div>

                    <div class="btn-group">
                        <button type="button" onclick="prevStep(3)" class="btn-secondary">Back</button>
                        <button type="button" id="submitBtn" onclick="simulateSendOTP()" class="btn-blue">
                            <span>Continue</span>
                        </button>
                    </div>
                </div>

                <div id="step4" class="step-container otp-container hidden">
                    <div class="otp-icon-wrapper">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h2 class="otp-title">Verify Your Email</h2>
                    <p class="otp-desc">We've sent a 6-digit confirmation code to <span id="displayEmail"></span>.</p>
                    
                    <div style="padding: 0.5rem 0;">
                        <input type="text" id="otp_input" maxlength="6" placeholder="------" class="otp-input">
                        <p id="err_otp" class="text-error hidden" style="margin-top: 0.5rem;">Invalid OTP. Try again.</p>
                    </div>

                    <button type="button" id="demoAutoFillBtn" onclick="autoFillOTP()" class="btn-demo">
                        <span id="demoBtnText">[Demo Mode] Auto-Fill Sample OTP</span>
                        <div id="demoBtnLoader" class="spinner hidden"></div>
                    </button>

                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <button type="submit" id="finalSubmitBtn" class="btn-auth-submit">
                            <span>Verify & Create Account</span>
                        </button>
                        <button type="button" onclick="prevStep(4)" class="btn-link">Change Email Address</button>
                    </div>
                </div>

                <div class="auth-footer-link" id="signInLinkBlock">
                    <p>Already have an account? <a href="login.html">Sign In</a></p>
                </div>

            </form>
        </div>
    </main>

  <footer class="auth-footer">
        <div class="auth-footer-content">
            <div class="auth-footer-brand">
                <div class="auth-footer-logo">
                    <span class="brand-icon">iM</span>
                    <span class="brand-text">ISSUE</span>
                </div>
            </div>
            <div class="auth-footer-links">
                <div>
                    <h4 class="footer-col-title">Contact Us</h4>
                </div>
            </div>
        </div>
    </footer>

    <script src="../database.js"></script>
    <script src="../assets/js/register.js"></script>


</body>
</html>
